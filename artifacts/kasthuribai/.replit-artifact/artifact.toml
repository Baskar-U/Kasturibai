kind = "web"
previewPath = "/"
title = "Kasthuribai Ready Mades"
version = "1.0.0"
id = "artifacts/kasthuribai"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25643

[services.development]
run = "pnpm --filter @workspace/kasthuribai run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/kasthuribai", "run", "build" ]
publicDir = "artifacts/kasthuribai/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25643"
BASE_PATH = "/"
